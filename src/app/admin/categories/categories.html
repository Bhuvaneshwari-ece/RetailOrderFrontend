<div class="container">

  <h2 class="title">Categories</h2>

  <div class="form-card">
    <div class="form-group">
      <label>Category Name</label>
      <input [(ngModel)]="name" placeholder="Enter category name">
    </div>

    <div class="form-group">
      <label>Description</label>
      <input [(ngModel)]="description" placeholder="Enter description">
    </div>

    <div class="form-actions">
      <button class="btn-add" (click)="add()">
        {{ editMode ? 'Update Category' : 'Add Category' }}
      </button>

      <button *ngIf="editMode" class="btn-cancel" (click)="cancelEdit()">
        Cancel
      </button>
    </div>
  </div>

  <hr class="divider">

  <h3 class="subtitle">Category List</h3>

  <div class="list-container">
    <div class="list-item" *ngFor="let c of categories">

      <div class="category-info">
        <h4>{{c.name}}</h4>
        <p>{{c.description}}</p>
      </div>

      <div class="actions">
        <button class="btn-edit" (click)="edit(c)">Edit</button>
        <button class="btn-delete" (click)="delete(c.id)">Delete</button>
      </div>

    </div>
  </div>

</div>
