<div class="container">

  <h2 class="title">Add Product</h2>

  <div class="form-card">
    <div class="form-group">
      <label>Product Name</label>
      <input [(ngModel)]="name" placeholder="Enter product name">
    </div>

    <div class="form-group">
      <label>Price</label>
      <input type="number" [(ngModel)]="price" placeholder="Enter price">
    </div>

    <div class="form-group">
      <label>Stock</label>
      <input type="number" [(ngModel)]="stock" placeholder="Enter stock">
    </div>

    <div class="form-group">
      <label>Category</label>
      <select [(ngModel)]="categoryId">
        <option value="">Select Category</option>
        <option *ngFor="let c of categories" [value]="c.id">
          {{c.name}}
        </option>
      </select>
    </div>

    <div class="form-actions">
      <button class="btn-add" (click)="addProduct()">
        {{ editMode ? 'Update Product' : 'Add Product' }}
      </button>

      <button *ngIf="editMode" class="btn-cancel" (click)="cancelEdit()">
        Cancel
      </button>
    </div>
  </div>

  <hr class="divider">

  <h2 class="subtitle">Products</h2>

  <table class="product-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Price</th>
        <th>Category</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let p of products">
        <td>{{p.name}}</td>
        <td>₹ {{p.price}}</td>
        <td>{{p.categoryName}}</td>
        <td>
          <button class="btn-edit" (click)="edit(p)">Edit</button>
          <button class="btn-delete" (click)="delete(p.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

</div>
